name: macOS rustls tests

on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]

jobs:
  macos-build:
    name: Build and Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Build Prerequisites
        run: |
          brew install autoconf libtool automake
          brew install go

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-cargo-

      - name: Checkout rustls v0.23.35
        uses: actions/checkout@v4
        with:
          repository: rustls/rustls
          ref: v/0.23.35
          fetch-depth: 0
          path: rustlsv0.23.35-test-workspace/rustls

      - name: Apply rustls test modifications
        working-directory: rustlsv0.23.35-test-workspace/rustls
        run: patch -p1 < "$GITHUB_WORKSPACE/.github/test-workspace/rustls-v0.23.35-tests.patch"

      - name: Assemble test workspace
        working-directory: rustlsv0.23.35-test-workspace
        run: |
          cp -r rustls/rustls/tests .
          cp "$GITHUB_WORKSPACE/.github/test-workspace/tests/Cargo.toml" tests/
          cp "$GITHUB_WORKSPACE/.github/test-workspace/tests/build.rs" tests/
          cp "$GITHUB_WORKSPACE/.github/test-workspace/tests/runners/all_test_suites.rs" tests/runners/

          cp "$GITHUB_WORKSPACE/.github/test-workspace/workspace-Cargo.toml" Cargo.toml

          mkdir -p rustls-wolfcrypt-provider
          cp -r "$GITHUB_WORKSPACE/wolfcrypt-rs" rustls-wolfcrypt-provider/
          cp -r "$GITHUB_WORKSPACE/rustls-wolfcrypt-provider" rustls-wolfcrypt-provider/
          cp "$GITHUB_WORKSPACE/.github/test-workspace/provider-Cargo.toml" \
             rustls-wolfcrypt-provider/rustls-wolfcrypt-provider/Cargo.toml

      - name: Build wolfcrypt-rs
        working-directory: rustlsv0.23.35-test-workspace/rustls-wolfcrypt-provider/wolfcrypt-rs
        run: make build

      - name: Build rustls-wolfcrypt-provider
        working-directory: rustlsv0.23.35-test-workspace/rustls-wolfcrypt-provider/rustls-wolfcrypt-provider
        run: cargo build --all-features --release

      - name: Run test suite
        working-directory: rustlsv0.23.35-test-workspace
        run: |
          cargo test -p tests --test all_suites \
            --features wolfcrypt-provider,tls12,fips,zlib,prefer-post-quantum,logging \
            --no-default-features
